<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Catálogo simple desde CSV</title>
  <meta name="description" content="Vista simple de catálogo cargada desde CSV.">
  <style>
    :root{
      --bg:#f7f7f7;
      --card:#ffffff;
      --text:#1f1f1f;
      --muted:#666666;
      --line:#e6e6e6;
      --accent:#111111;
      --radius:18px;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --container:1120px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
    }
    .page{
      max-width:var(--container);
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .catalog-header{margin-bottom:22px}
    .catalog-title{
      margin:0;
      font-size:clamp(24px, 4vw, 36px);
      line-height:1.1;
    }
    .catalog-subtitle{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:18px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      min-height:100%;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease;
    }
    .card:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 28px rgba(0,0,0,.10);
    }
    .card-media{
      width:100%;
      aspect-ratio:1 / 1;
      overflow:hidden;
      background:#ececec;
    }
    .card-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .card-body{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .name{
      margin:0;
      font-size:20px;
      line-height:1.2;
    }
    .meta{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      border-top:1px solid var(--line);
      padding-top:10px;
      margin-top:auto;
    }
    .meta-item small{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:2px;
    }
    .meta-item strong{
      font-size:18px;
      line-height:1.1;
    }
    .empty{
      display:none;
      background:#fff;
      border:1px dashed #cfcfcf;
      color:#555;
      padding:16px;
      border-radius:14px;
      text-align:center;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:999;
    }
    .modal.open{display:flex}
    .modal-box{
      width:min(760px,100%);
      background:#fff;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
      position:relative;
    }
    .modal-close{
      position:absolute;
      top:12px;
      right:12px;
      border:none;
      background:#fff;
      width:38px;
      height:38px;
      border-radius:999px;
      box-shadow:0 2px 10px rgba(0,0,0,.15);
      cursor:pointer;
      font-size:20px;
      line-height:1;
    }
    .modal-content{
      display:grid;
      grid-template-columns:1fr 1fr;
      min-height:320px;
    }
    .modal-image{
      background:#efefef;
      min-height:320px;
    }
    .modal-image img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .modal-info{
      padding:28px 22px 22px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .modal-title{
      margin:0;
      font-size:28px;
      line-height:1.1;
    }
    .modal-desc{
      margin:0;
      color:#4f4f4f;
      font-size:15px;
      white-space:pre-line;
    }
    .modal-meta{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:auto;
      padding-top:10px;
      border-top:1px solid var(--line);
    }
    .modal-meta div small{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-bottom:2px;
    }
    .modal-meta div strong{
      font-size:20px;
    }

    @media (max-width:700px){
      .page{padding:18px 12px 28px}
      .card-body{padding:14px}
      .name{font-size:18px}
      .modal-content{grid-template-columns:1fr}
      .modal-image{min-height:240px}
      .modal-title{font-size:24px}
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="catalog-header">
      <h1 class="catalog-title">Catálogo</h1>
      <p class="catalog-subtitle">Haz clic en un producto para ver la descripción.</p>
    </header>

    <section id="grid" class="grid"></section>
    <div id="empty" class="empty"></div>
  </main>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-box">
      <button id="modalClose" class="modal-close" aria-label="Cerrar">×</button>
      <div class="modal-content">
        <div class="modal-image">
          <img id="modalImg" src="" alt="">
        </div>
        <div class="modal-info">
          <h2 id="modalTitle" class="modal-title"></h2>
          <p id="modalDesc" class="modal-desc"></p>
          <div class="modal-meta">
            <div>
              <small>Precio</small>
              <strong id="modalPrice"></strong>
            </div>
            <div>
              <small>Peso</small>
              <strong id="modalPeso"></strong>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const modal = document.getElementById('modal');
    const modalClose = document.getElementById('modalClose');
    const modalImg = document.getElementById('modalImg');
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');
    const modalPrice = document.getElementById('modalPrice');
    const modalPeso = document.getElementById('modalPeso');

    function money(v){
      if(v === undefined || v === null || v === '') return '';
      const s = String(v).trim();
      if(!s || /^n\/a$/i.test(s)) return 'N/A';
      const n = Number(s);
      return Number.isFinite(n)
        ? n.toLocaleString('es-MX', { style:'currency', currency:'MXN', maximumFractionDigits:0 })
        : s;
    }

    function splitMulti(v){
      if(v === undefined || v === null) return [];
      const s = String(v).trim();
      if(!s) return [];
      if(s.includes('|||')) return s.split('|||').map(x => x.trim()).filter(Boolean);
      if(s.includes('\n')) return s.split('\n').map(x => x.trim()).filter(Boolean);
      return [s];
    }

    function normalizeImagePath(value, codigo){
      const raw = (value || '').toString().trim();
      if(raw){
        if(/^https?:\/\//i.test(raw)) return raw;
        if(/^assets\/images\//i.test(raw)) return raw;
        return 'assets/images/' + raw.replace(/^\.?\/*/, '').replace(/^assets\/images\//i, '');
      }
      if(codigo){
        return 'assets/images/' + String(codigo).trim() + '.webp';
      }
      return 'assets/images/placeholder.webp';
    }

    function fallbackByCategory(cat){
      const c = (cat || '').toString().toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      if(c.includes('solido')) return 'assets/images/102000.webp';
      if(c.includes('shampoo') || c.includes('corporal') || c.includes('liquido')) return 'assets/images/104000.webp';
      return 'assets/images/102000.webp';
    }

    function handleImgError(img){
      const base = img.dataset.base || '';
      const step = img.dataset.step || 'webp';
      if(base && step === 'webp'){
        img.dataset.step = 'jpg';
        img.src = base + '.jpg';
        return;
      }
      if(base && step === 'jpg'){
        img.dataset.step = 'png';
        img.src = base + '.png';
        return;
      }
      if(img.dataset.fallback){
        img.onerror = null;
        img.src = img.dataset.fallback;
        return;
      }
      img.onerror = null;
    }

    function baseFromImagePath(path){
      return path.replace(/\.(webp|png|jpg|jpeg)$/i,'');
    }

    function parseCSV(text){
      const rows = [];
      let row = [];
      let value = '';
      let i = 0;
      let inQuotes = false;

      while(i < text.length){
        const ch = text[i];
        const next = text[i + 1];

        if(ch === '"'){
          if(inQuotes && next === '"'){
            value += '"';
            i += 2;
            continue;
          }
          inQuotes = !inQuotes;
          i++;
          continue;
        }

        if(ch === ',' && !inQuotes){
          row.push(value);
          value = '';
          i++;
          continue;
        }

        if((ch === '\n' || ch === '\r') && !inQuotes){
          if(ch === '\r' && next === '\n') i++;
          row.push(value);
          rows.push(row);
          row = [];
          value = '';
          i++;
          continue;
        }

        value += ch;
        i++;
      }

      if(value.length || row.length){
        row.push(value);
        rows.push(row);
      }

      if(!rows.length) return [];
      const headers = rows[0].map(h => h.trim());

      return rows
        .slice(1)
        .filter(r => r.some(cell => (cell || '').trim() !== ''))
        .map(r => {
          const obj = {};
          headers.forEach((h, idx) => obj[h] = (r[idx] ?? '').trim());
          return obj;
        });
    }

    function productCard(p){
      const el = document.createElement('article');
      el.className = 'card';

      const imagePath = normalizeImagePath(p.Imagen || p.img || p.imagen || '', p.codigo);
      const imgBase = baseFromImagePath(imagePath);
      const fallback = fallbackByCategory(p.categoria);
      const peso = p.contenido || '';

      el.innerHTML = `
        <div class="card-media">
          <img
            src="${imagePath}"
            alt="${p.nombre || ''}"
            loading="lazy"
            data-base="${imgBase}"
            data-step="webp"
            data-fallback="${fallback}"
          >
        </div>
        <div class="card-body">
          <h2 class="name">${p.nombre || 'Producto'}</h2>
          <div class="meta">
            <div class="meta-item">
              <small>Precio</small>
              <strong>${money(p.precioPublico)}</strong>
            </div>
            <div class="meta-item">
              <small>Peso</small>
              <strong>${peso}</strong>
            </div>
          </div>
        </div>
      `;

      const img = el.querySelector('img');
      img.onerror = () => handleImgError(img);

      el.addEventListener('click', () => openModal(p, imagePath, imgBase, fallback));

      return el;
    }

    function openModal(p, imagePath, imgBase, fallback){
      const description = splitMulti(p.beneficios).join('\n• ');
      modalTitle.textContent = p.nombre || 'Producto';
      modalDesc.textContent = description ? '• ' + description : 'Sin descripción disponible.';
      modalPrice.textContent = money(p.precioPublico);
      modalPeso.textContent = p.contenido || '—';
      modalImg.src = imagePath;
      modalImg.alt = p.nombre || '';
      modalImg.dataset.base = imgBase;
      modalImg.dataset.step = 'webp';
      modalImg.dataset.fallback = fallback;
      modalImg.onerror = () => handleImgError(modalImg);
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal(){
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if(e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') closeModal();
    });

    function render(rows){
      grid.innerHTML = '';

      if(!rows.length){
        empty.style.display = 'block';
        empty.innerHTML = 'No se encontraron productos en el CSV.';
        return;
      }

      empty.style.display = 'none';
      rows.forEach(row => grid.appendChild(productCard(row)));
    }

    async function loadCSV(){
      const tries = [
        './catalogo_productos.csv',
        'catalogo_productos.csv',
        './productos.csv',
        'productos.csv'
      ];

      for(const url of tries){
        try{
          const r = await fetch(url + '?v=' + Date.now(), { cache:'no-store' });
          if(!r.ok) continue;
          const buf = await r.arrayBuffer();
          let text = new TextDecoder('utf-8').decode(buf);
          if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
          return parseCSV(text);
        }catch(e){
          console.error('Error intentando cargar', url, e);
        }
      }

      throw new Error('No se pudo cargar el CSV.');
    }

    loadCSV()
      .then(render)
      .catch(err => {
        console.error(err);
        empty.style.display = 'block';
        empty.innerHTML = 'No se pudo cargar el archivo CSV. Verifica que exista y esté guardado como CSV UTF-8.';
      });
  </script>
</body>
</html>
